<header class="site-header" role="banner">
  <div class="header-inner">

    <!-- Left -->
    <div class="logo-sub-icons">
      <a href="/index.html" class="header-logo-icon">
        <img src="/assets/images/albalogo.png" width="32">
      </a>

      <a href="#" class="ai-widget-toggle">
        <img src="/assets/images/albamenai.png" width="32">
      </a>

      <!-- 👤 ACCOUNT -->
      <div class="alien-dropdown-container">

        <!-- 👽 ИКОНКА (будет заменяться на аватар) -->
        <a href="#" class="alien-ghost" onclick="toggleAlienMenu(event)">
          <img id="accountAvatar" src="/assets/icons/alien.png" width="32">
        </a>

        <div id="alienMenu" class="alien-menu" hidden>

          <button class="alien-menu-item" onclick="login()">
            🔑 Google ile Giriş Yap
          </button>

          <button class="alien-menu-item" onclick="logout()">
            🚪 Çıkış Yap
          </button>

          <!-- 👤 USER INFO -->
          <div id="user" style="padding:10px; font-size:14px;"></div>

        </div>
      </div>
    </div>

    <!-- Center -->
    <a href="/index.html" class="header-logo main-center-logo">
      <img src="/assets/images/albaspace.png">
    </a>

    <!-- Nav -->
    <nav class="main-nav">
      <a href="/shop.html">MAĞAZA</a>
      <a href="/atlas.html">ATLAS</a>
    </nav>

  </div>
</header>

<script>
const API = "https://albaspace-api.nncdecdgc.workers.dev";

// ======================
// 🔐 LOGIN
// ======================
function login() {
  window.location.href = API + "/auth/google";
}

// ======================
// 🚪 LOGOUT
// ======================
function logout() {
  document.cookie = "user_id=; Max-Age=0; path=/;";
  location.reload();
}

// ======================
// 👤 CHECK USER
// ======================
async function checkUser() {
  try {
    const res = await fetch(API + "/me", {
      credentials: "include"
    });

    if (res.status !== 200) return;

    const user = await res.json();

    // вставляем имя
    document.getElementById("user").innerHTML = `
      <div style="display:flex;align-items:center;gap:10px;">
        <img src="${user.avatar}" width="32" style="border-radius:50%">
        <span>${user.name}</span>
      </div>
    `;

    // 🔥 меняем иконку на аватар
    document.getElementById("accountAvatar").src = user.avatar;

  } catch (e) {
    console.log("not logged");
  }
}

checkUser();

// ======================
// меню (оставил твое)
// ======================
function toggleAlienMenu(e) {
  e.preventDefault();
  const menu = document.getElementById('alienMenu');
  menu.hidden = !menu.hidden;
}
</script>
