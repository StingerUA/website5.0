<link rel="stylesheet" href="/assets/css/dropdown-optimized.css">
<script src="/assets/js/menu-toggle.js" defer></script>
<script src="/assets/js/worker-auth.js" defer></script>

<!-- 🔥 НОВАЯ ЛОГИКА АВТОРИЗАЦИИ -->
<script>
const API = "https://albaspace-api.nncdecdgc.workers.dev";

// 🔐 LOGIN
function login() {
  window.location.href = API + "/auth/google";
}

// 🚪 LOGOUT
function logout() {
  document.cookie = "user_id=; Max-Age=0; path=/;";
  location.reload();
}

// 👤 CHECK USER
async function checkUser() {
  try {
    const res = await fetch(API + "/me", {
      credentials: "include"
    });

    if (res.status !== 200) return;

    const user = await res.json();

    // вставляем имя + аватар в меню
    document.getElementById("user").innerHTML = `
      <div style="display:flex;align-items:center;gap:8px;padding:8px;">
        <img src="${user.avatar}" width="28" style="border-radius:50%">
        <span>${user.name}</span>
      </div>
    `;

    // 🔥 меняем иконку
    document.getElementById("accountAvatar").src = user.avatar;

  } catch (e) {
    console.log("not logged");
  }
}

checkUser();
</script>
