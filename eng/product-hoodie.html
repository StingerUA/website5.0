<!DOCTYPE html>
<html lang="en" class="product-text-black">
<head>
  <link rel="icon" type="image/png" href="/assets/icons/AlbaLogo.png" sizes="32x32">
  <link rel="apple-touch-icon" href="/assets/icons/AlbaLogo.png" sizes="180x180">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#020617">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pullover Hoodie – Alba Space</title>
  <meta name="description" content="Alba Space Pullover Hoodie — heavy-weight fleece, premium ring-spun cotton construction.">
  <meta property="og:title" content="Pullover Hoodie – Alba Space">
  <meta property="og:description" content="Alba Space Pullover Hoodie — heavy-weight fleece, premium ring-spun cotton construction.">
  <meta property="og:image" content="/assets/images/hoodie.png">
  <meta property="og:url" content="https://albaspace.com.tr/eng/product-hoodie.html">
  <meta property="og:type" content="product">
  <link rel="stylesheet" href="/assets/css/site.css">
  <link rel="stylesheet" href="/assets/css/fix-layout.css">
  <link rel="stylesheet" href="/assets/css/product.css">
  <link rel="stylesheet" href="/assets/css/product-overrides.css">
  <link rel="stylesheet" href="/assets/css/product-text-black.css">
  <style>
    :root { --header-bg: #020617; }
    body { background: #ffffff; margin: 0; }
  </style>
  <script src="/assets/js/include.js" defer></script>
  <script src="/assets/js/menu-toggle.js" defer></script>
  <script src="/assets/js/cart.js" defer></script>
</head>
<body>
  <div data-include="/header-en-black"></div>

  <main class="product-page-wrap">
    <nav class="product-breadcrumb">
      <a href="/eng/shop.html" style="color:inherit;text-decoration:none">Shop</a><span>/</span>Clothing
    </nav>

    <div class="product-main-grid">

      <div class="product-image-col p-reveal">
        <div class="product-main-image-wrap">
          <img id="mainImage" src="/assets/images/hoodie.png" alt="Pullover Hoodie">
        </div>
        <div class="product-thumbs">
          <button class="thumb-btn active" onclick="changeImage(this,'/assets/images/hoodie.png')" aria-label="Hoodie">
            <img src="/assets/images/hoodie.png" alt="Hoodie" loading="lazy">
          </button>
          <button class="thumb-btn" onclick="changeImage(this,'/assets/images/hoodie1.png')" aria-label="Hoodie 2">
            <img src="/assets/images/hoodie1.png" alt="Hoodie 2" loading="lazy">
          </button>
          <button class="thumb-btn" onclick="changeImage(this,'/assets/images/hoodie2.png')" aria-label="Hoodie 3">
            <img src="/assets/images/hoodie2.png" alt="Hoodie 3" loading="lazy">
          </button>
          <button class="thumb-btn" onclick="changeImage(this,'/assets/images/hoodie3.png')" aria-label="Hoodie 4">
            <img src="/assets/images/hoodie3.png" alt="Hoodie 4" loading="lazy">
          </button>
        </div>
      </div>

      <div class="product-info-col p-reveal" style="transition-delay:0.12s">
        <h1 class="product-title">Pullover Hoodie</h1>

        <div class="product-price-block">
          <span class="product-price-old">1.400,00 ₺</span>
          <span class="product-discount-tag">−30%</span>
          <span class="product-price-current">980,00 ₺</span>
        </div>

        <div class="product-features-card">
          <h3>Features</h3>
          <ul class="product-features-list">
            <li><span class="feature-dot"></span>Heavy 10oz fleece fabric</li>
            <li><span class="feature-dot"></span>Premium ring-spun cotton</li>
            <li><span class="feature-dot"></span>1×1 rib-knit at cuffs & waist</li>
            <li><span class="feature-dot"></span>Fleece-lined hood</li>
            <li><span class="feature-dot"></span>Alba Space logo</li>
          </ul>
        </div>

        <div class="product-size-wrap">
          <label>Select Size</label>
          <div class="size-options">
            <button class="size-btn" onclick="selectSize(this)">XS</button>
            <button class="size-btn active" onclick="selectSize(this)">S</button>
            <button class="size-btn" onclick="selectSize(this)">M</button>
            <button class="size-btn" onclick="selectSize(this)">L</button>
            <button class="size-btn" onclick="selectSize(this)">XL</button>
            <button class="size-btn" onclick="selectSize(this)">XXL</button>
          </div>
        </div>
        <div class="product-payment-icons">
          <img src="/assets/icons/mastercard.png" alt="Mastercard">
          <img src="/assets/icons/visa.png" alt="Visa">
        </div>

        <div class="product-cta-row">
          <div class="qty-control">
            <button class="qty-btn" onclick="updateQty(-1)">−</button>
            <input type="number" id="qtyInput" class="qty-input" value="1" min="1">
            <button class="qty-btn" onclick="updateQty(1)">+</button>
          </div>
          <button id="addToCartBtn" class="btn-add-cart"
            data-product-id="hoodie"
            data-product-name="Pullover Hoodie"
            data-product-image="/assets/images/hoodie.png"
            data-add-label="ADD TO CART"
            data-added-label="✓ ADDED!">
            ADD TO CART
          </button>
          <a href="https://www.shopier.com/albaspaceshop/46492844" target="_blank" rel="noopener noreferrer" class="btn-buy-now">BUY NOW</a>
        </div>
      </div>
    </div>

    <section class="related-section p-reveal">
      <h2>You may also like</h2>
      <div class="related-accent-line"></div>
      <div id="related-products-container"></div>
    </section>
  </main>

  <div data-include="/footer-en-black"></div>

  <script>
    function changeImage(btn, src) {
      document.getElementById('mainImage').src = src;
      document.querySelectorAll('.thumb-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }
    function updateQty(d) {
      const i = document.getElementById('qtyInput');
      i.value = Math.max(1, parseInt(i.value || 1) + d);
    }
    function selectSize(btn) {
      document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }
    const obs = new IntersectionObserver(
      es => es.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); }),
      { threshold: 0.08 }
    );
    document.querySelectorAll('.p-reveal').forEach(el => obs.observe(el));
    document.getElementById('addToCartBtn').addEventListener('click', function() {
      const btn = this, qty = parseInt(document.getElementById('qtyInput').value || 1, 10);
      if (typeof cartManager !== 'undefined') {
        cartManager.addItem({
          id: btn.dataset.productId, name: btn.dataset.productName,
          image: btn.dataset.productImage, url: window.location.pathname, qty
        });
      }
      btn.classList.add('added');
      btn.textContent = btn.dataset.addedLabel;
      btn.disabled = true;
      setTimeout(() => {
        btn.classList.remove('added');
        btn.textContent = btn.dataset.addLabel;
        btn.disabled = false;
      }, 1600);
    });
  </script>
  <script src="/assets/js/related-products.js" defer></script>
</body>
</html>
