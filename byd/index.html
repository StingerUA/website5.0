 <!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebAR: Albaspace Fix</title>
    
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; color: white; }
        #app-container { position: relative; width: 100vw; height: 100vh; }
        video, canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        video { z-index: 1; }
        #three_canvas { z-index: 2; pointer-events: none; }
        .ui-overlay { position: absolute; bottom: 30px; left: 0; right: 0; z-index: 100; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .status-badge { background: rgba(0, 0, 0, 0.7); padding: 8px 15px; border-radius: 20px; font-size: 14px; }
        .controls { display: flex; gap: 10px; background: rgba(255, 255, 255, 0.1); padding: 10px; border-radius: 15px; backdrop-filter: blur(10px); }
        button { padding: 12px 18px; border: none; background: rgba(255,255,255,0.2); color: white; border-radius: 10px; cursor: pointer; font-weight: bold; }
        button.active { background: #3498db; }
    </style>
</head>
<body>

    <div id="app-container">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="three_canvas"></canvas>

        <div class="ui-overlay">
            <div class="status-badge" id="status">Загрузка...</div>
            <div class="controls">
                <button onclick="switchModel('glasses1')" id="btn-glasses1">Очки 1</button>
                <button onclick="switchModel('glasses2')" id="btn-glasses2">Очки 2</button>
                <button onclick="switchModel('cap1')" id="btn-cap1">Кепка</button>
                <button onclick="switchModel('none')">Сброс</button>
            </div>
        </div>
    </div>

    <script type="module">
        // Теперь импорты будут работать корректно благодаря Import Map
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.js";

        const MODELS_CONFIG = {
            glasses1: { type: 'glasses', url: 'glasses1.glb', scale: 0.15, yOffset: 0 },
            glasses2: { type: 'glasses', url: 'glasses2.glb', scale: 0.16, yOffset: 0 },
            cap1:     { type: 'cap',     url: 'cap1.glb',     scale: 0.35, yOffset: 0.18 }
        };

        const video = document.getElementById("webcam");
        const status = document.getElementById("status");
        let faceLandmarker, scene, camera, renderer, gltfLoader;
        let currentModel = null;
        let activeKey = 'none';
        let lastVideoTime = -1;

        async function initAR() {
            try {
                const filesetResolver = await FilesetResolver.forVisionTasks(
                    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/wasm"
                );
                faceLandmarker = await FaceLandmarker.createFromOptions(filesetResolver, {
                    baseOptions: {
                        modelAssetPath: `https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task`,
                        delegate: "GPU"
                    },
                    runningMode: "VIDEO",
                    numFaces: 1
                });
                
                initThreeJS();
                startCamera();
            } catch (e) {
                status.innerText = "Ошибка инициализации";
                console.error(e);
            }
        }

        function initThreeJS() {
            scene = new THREE.Scene();
            const aspect = window.innerWidth / window.innerHeight;
            camera = new THREE.OrthographicCamera(-aspect, aspect, 1, -1, 0.1, 1000);
            camera.position.z = 10;

            renderer = new THREE.WebGLRenderer({
                canvas: document.getElementById('three_canvas'),
                alpha: true,
                antialias: true
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);

            scene.add(new THREE.AmbientLight(0xffffff, 2.0));
            const dl = new THREE.DirectionalLight(0xffffff, 2.0);
            dl.position.set(0, 1, 2);
            scene.add(dl);

            gltfLoader = new GLTFLoader();
        }

        window.switchModel = (key) => {
            if (currentModel) scene.remove(currentModel);
            document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            if(key === 'none') { activeKey = 'none'; return; }

            const config = MODELS_CONFIG[key];
            document.getElementById(`btn-${key}`)?.classList.add('active');
            
            gltfLoader.load(config.url, (gltf) => {
                currentModel = gltf.scene;
                scene.add(currentModel);
                activeKey = key;
                status.innerText = "Модель загружена";
            });
        };

        async function startCamera() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            video.srcObject = stream;
            video.addEventListener("loadeddata", () => predictWebcam());
        }

        function predictWebcam() {
            if (lastVideoTime !== video.currentTime) {
                lastVideoTime = video.currentTime;
                const results = faceLandmarker.detectForVideo(video, performance.now());
                if (results.faceLandmarks && results.faceLandmarks[0] && currentModel) {
                    updateTransform(results.faceLandmarks[0]);
                }
            }
            renderer.render(scene, camera);
            requestAnimationFrame(predictWebcam);
        }

        function updateTransform(landmarks) {
            currentModel.visible = true;
            const config = MODELS_CONFIG[activeKey];
            const aspect = window.innerWidth / window.innerHeight;

            const getPos = (idx) => ({
                x: (landmarks[idx].x * 2 - 1) * aspect,
                y: -(landmarks[idx].y * 2 - 1),
                z: -landmarks[idx].z * 10
            });

            const bridge = getPos(168);
            const forehead = getPos(10);
            const left = getPos(234);
            const right = getPos(454);

            const faceWidth = Math.sqrt(Math.pow(right.x - left.x, 2) + Math.pow(right.y - left.y, 2));
            const angle = Math.atan2(right.y - left.y, right.x - left.x);

            if (config.type === 'glasses') {
                currentModel.position.set(bridge.x, bridge.y, bridge.z);
            } else {
                currentModel.position.set(forehead.x, forehead.y + config.yOffset, forehead.z);
            }

            currentModel.rotation.z = angle;
            const s = faceWidth * config.scale * 10;
            currentModel.scale.set(s, s, s);
        }

        initAR();
    </script>
</body>
</html>
