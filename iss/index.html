<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Uluslararası Uzay İstasyonu – Alba Space</title>
  <link rel="icon" type="image/png" href="/favicon.png" />

  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.0.0/model-viewer.min.js"></script>

  <style>
    body { font-family: Arial; background: #000; color: #fff; }
    model-viewer { width: 100%; height: 600px; }
    .locked {
      text-align: center;
      font-size: 22px;
      margin-top: 50px;
      color: red;
    }
  </style>
</head>

<body>

<h1>Uluslararası Uzay İstasyonu</h1>

<div class="container">
  <p>Uluslararası Uzay İstasyonu...</p>

  <!-- viewer БЕЗ src -->
  <model-viewer src="https://albaspace-api.nncdecdgc.workers.dev/model?slug=iss&public=1"
    id="viewer"
    camera-controls
    ar
    ar-modes="webxr scene-viewer quick-look">
  </model-viewer>

  <div id="lock" class="locked" style="display:none;">
    🔒 Bu modeli görmek için satın almalısın
  </div>
</div>

<script>
async function loadModel() {
  try {
    const res = await fetch(
      "https://albaspace-api.nncdecdgc.workers.dev/model?slug=iss&lang=eng",
      {
        credentials: "include"
      }
    );

    if (res.status !== 200) {
      document.getElementById("viewer").style.display = "none";
      document.getElementById("lock").style.display = "block";
      return;
    }

    const blob = await res.blob();
    const url = URL.createObjectURL(blob);

    document.getElementById("viewer").src = url;

  } catch (e) {
    console.error("Model load error:", e);
  }
}

loadModel();
</script>

</body>
</html>
